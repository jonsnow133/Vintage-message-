<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>A Hidden Letter</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#2b1b12;
font-family:Courier New, monospace;
color:#f5e8d0;
}

.letter{
background:#3b2415;
padding:40px;
width:320px;
border-radius:10px;
box-shadow:0 10px 30px rgba(0,0,0,0.6);
font-size:18px;
line-height:1.6;
text-align:center;
}

.cursor{
display:inline-block;
width:2px;
background:#f5e8d0;
margin-left:3px;
animation:blink 1s infinite;
}

@keyframes blink{
0%{opacity:1;}
50%{opacity:0;}
100%{opacity:1;}
}

</style>
</head>

<body>
  <audio id="bgMusic" src="rain.mp3" loop></audio>

<div class="letter">

<p style="font-size:14px;opacity:0.6;">Tap anywhere to reveal the message</p>

<span id="text"></span><span class="cursor"></span>

</div>

<script>

let message ="koi gossip ho toh btaye maalik😁";

let i = 0;

function typeWriter(){

if(i < message.length){

document.getElementById("text").innerHTML += message.charAt(i);

i++;

setTimeout(typeWriter,60);

}

}

document.body.addEventListener("click", function(){

/* start music */

document.getElementById("bgMusic").play();

/* start typing */

typeWriter();

},{once:true});

</script>

</body>
</html>
